version: "1.0"
template_name: "文艺单页01"
style_group: "文艺"
fallback: false

basic_info:
  fields:
    name:
      type: "keyword_scan"
      keywords: ["白晓云"]
      value_scope: "full_node"
    title:
      type: "label_inline"
      pattern: "求职意向"
    phone:
      type: "label_inline"
      pattern: "电话"
    email:
      type: "label_inline"
      pattern: "邮箱"
    summary:
      type: "section_replace"
      section: "自我评价"

sections:
  education:
    header: "教育经历"
    entry_schema:
      school:
        type: "keyword_scan"
        keywords: ["学院", "大学", "原画"]
        value_scope: "keyword_substring"
      major:
        type: "keyword_scan"
        keywords: ["美术", "设计", "专业"]
        value_scope: "keyword_substring"
    item_separator: "paragraph"

  experience:
    header: "工作经历"
    entry_schema:
      company:
        type: "keyword_scan"
        keywords: ["出版社", "公司", "画院"]
        value_scope: "keyword_substring"
      role:
        type: "keyword_scan"
        keywords: ["插画师", "设计师", "编辑", "主编"]
        value_scope: "keyword_substring"
    item_separator: "paragraph"

  honors:
    header: "荣誉证书"
    type: "section_replace"

  skills:
    header: "职业技能"
    type: "section_replace"
