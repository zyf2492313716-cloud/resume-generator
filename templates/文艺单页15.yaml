version: '1.0'
template_name: 文艺单页15
style_group: 文艺
fallback: false
basic_info:
  fields:
    name:
      type: keyword_scan
      keywords:
      - 北京海淀
      value_scope: full_node
    title:
      type: label_inline
      pattern: 求职意向
    phone:
      type: label_inline
      pattern: 电话
    email:
      type: label_inline
      pattern: 邮箱
    summary:
      type: section_replace
      section: 自我评价
sections:
  skills:
    header: 通用技能证书：  英语四级证书、普通话二级甲等证书、机动车驾驶证
    type: section_replace
  honors:
    header: 活动荣誉奖励：  2014年湖北省创青春创业计划移动专项赛银奖
    type: section_replace
  education:
    header: 教育背景
    entry_schema:
      school:
        type: keyword_scan
        keywords:
        - 大学
        - 学院
        - 学校
        value_scope: keyword_substring
      major:
        type: keyword_scan
        keywords:
        - 专业
        - 工程
        - 管理
        - 设计
        value_scope: keyword_substring
      degree:
        type: keyword_scan
        keywords:
        - 本科
        - 硕士
        - 博士
        - 学士
        value_scope: keyword_substring
    item_separator: paragraph
  experience:
    header: 工作经历
    entry_schema:
      company:
        type: keyword_scan
        keywords:
        - 公司
        - 科技
        - 企业
        - 集团
        - 有限
        - 研究院
        - 医院
        - 银行
        value_scope: keyword_substring
      role:
        type: keyword_scan
        keywords:
        - 经理
        - 助理
        - 总监
        - 专员
        - 工程师
        - 实习
        - 主管
        value_scope: keyword_substring
    item_separator: paragraph
  studentWork:
    header: 校内实践
    entry_schema:
      organization:
        type: keyword_scan
        keywords:
        - 学生会
        - 社团
        - 协会
        - 中心
        - 组织
        value_scope: keyword_substring
      role:
        type: keyword_scan
        keywords:
        - 部长
        - 副部
        - 主席
        - 副主席
        - 助理
        - 干事
        - 成员
        value_scope: keyword_substring
    item_separator: paragraph
