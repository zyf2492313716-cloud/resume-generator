version: "1.0"
template_name: "文艺单页20"
style_group: "文艺"
fallback: false

basic_info:
  fields:
    name:
      type: "keyword_scan"
      keywords: ["孟子君"]
      value_scope: "full_node"
    title:
      type: "label_inline"
      pattern: "求职意向"
    phone:
      type: "label_inline"
      pattern: "手机"
    email:
      type: "label_inline"
      pattern: "邮箱"
    summary:
      type: "section_replace"
      section: "自我评价"

sections:
  education:
    header: "教育背景"
    entry_schema:
      school:
        type: "keyword_scan"
        keywords: ["大学", "学院", "师范"]
        value_scope: "keyword_substring"
      major:
        type: "keyword_scan"
        keywords: ["经济", "贸易", "专业"]
        value_scope: "keyword_substring"
    item_separator: "paragraph"

  experience:
    header: "工作经验"
    entry_schema:
      company:
        type: "keyword_scan"
        keywords: ["公司", "企业", "集团", "管理"]
        value_scope: "keyword_substring"
      role:
        type: "keyword_scan"
        keywords: ["助理", "经理", "总监", "专员"]
        value_scope: "keyword_substring"
    item_separator: "paragraph"

  honors:
    header: "荣誉奖项"
    type: "section_replace"

  skills:
    header: "技能证书"
    type: "section_replace"
