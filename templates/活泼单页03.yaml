version: '1.0'
template_name: 活泼单页03
style_group: 活泼
fallback: false
basic_info:
  fields:
    name:
      type: keyword_scan
      keywords:
      - 赵晓
      value_scope: full_node
    title:
      type: label_inline
      pattern: 求职意向
    phone:
      type: label_inline
      pattern: 电话
    email:
      type: label_inline
      pattern: 邮箱
    summary:
      type: section_replace
      section: 个人简介
sections:
  studentWork:
    header: 2012年暑假社会实践活动中获得个人现金奖
    entry_schema:
      organization:
        type: keyword_scan
        keywords:
        - 学生会
        - 社团
        - 协会
        - 中心
        - 组织
        value_scope: keyword_substring
      role:
        type: keyword_scan
        keywords:
        - 部长
        - 副部
        - 主席
        - 副主席
        - 助理
        - 干事
        - 成员
        value_scope: keyword_substring
    item_separator: paragraph
  honors:
    header: 奖项荣誉
    type: section_replace
  experience:
    header: 工作实践
    entry_schema:
      company:
        type: keyword_scan
        keywords:
        - 公司
        - 科技
        - 企业
        - 集团
        - 有限
        - 研究院
        - 医院
        - 银行
        value_scope: keyword_substring
      role:
        type: keyword_scan
        keywords:
        - 经理
        - 助理
        - 总监
        - 专员
        - 工程师
        - 实习
        - 主管
        value_scope: keyword_substring
    item_separator: paragraph
