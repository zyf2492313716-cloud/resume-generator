version: '1.0'
template_name: 活泼单页08
style_group: 活泼
fallback: false
basic_info:
  fields:
    name:
      type: keyword_scan
      keywords:
      - 个人资料
      value_scope: full_node
    title:
      type: label_inline
      pattern: 求职意向
    phone:
      type: label_inline
      pattern: 电话
    email:
      type: label_inline
      pattern: 邮箱
    summary:
      type: section_replace
      section: 自我评价 SELF
sections:
  skills:
    header: 职业技能
    type: section_replace
