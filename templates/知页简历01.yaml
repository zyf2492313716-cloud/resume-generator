version: "1.0"
template_name: "知页简历01"
style_group: "知页"
fallback: false

basic_info:
  fields:
    name:
      type: "keyword_scan"
      keywords:
        - "陈知页"
        - "陈"
      value_scope: "full_node"
    title:
      type: "keyword_scan"
      keywords:
        - "销售经理"
        - "经理"
      value_scope: "full_node"
    phone:
      type: "label_adjacent"
      pattern: "手机"
    email:
      type: "label_adjacent"
      pattern: "邮箱"
    summary:
      type: "section_replace"
      section: "个人介绍"

sections:
  education:
    header: "教育背景"
    entry_schema:
      school:
        type: "keyword_scan"
        keywords:
          - "大学"
          - "学院"
        value_scope: "keyword_substring"
      major:
        type: "keyword_scan"
        keywords:
          - "管理"
          - "商务"
          - "心理"
          - "专业"
        value_scope: "keyword_substring"
      degree:
        type: "keyword_scan"
        keywords:
          - "本科"
          - "硕士"
          - "博士"
        value_scope: "keyword_substring"
    item_separator: "paragraph"

  experience:
    header: "工作经历"
    entry_schema:
      company:
        type: "keyword_scan"
        keywords:
          - "公司"
          - "科技"
          - "企业"
          - "集团"
          - "连锁"
        value_scope: "keyword_substring"
      role:
        type: "keyword_scan"
        keywords:
          - "销售"
          - "专员"
          - "经理"
          - "助理"
        value_scope: "keyword_substring"
    item_separator: "paragraph"

  studentWork:
    header: "在校经历"
    entry_schema:
      organization:
        type: "keyword_scan"
        keywords:
          - "大学"
          - "学院"
          - "辩论队"
        value_scope: "keyword_substring"
      role:
        type: "keyword_scan"
        keywords:
          - "队长"
          - "部长"
          - "助理"
        value_scope: "keyword_substring"
    item_separator: "paragraph"
