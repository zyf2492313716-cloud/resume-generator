version: "1.0"
template_name: "知页简历02"
style_group: "知页"
fallback: false

basic_info:
  fields:
    name:
      type: "keyword_scan"
      keywords:
        - "陈知页"
        - "陈"
      value_scope: "full_node"
    title:
      type: "label_adjacent"
      pattern: "期望职位"
    phone:
      type: "label_adjacent"
      pattern: "手机"
    email:
      type: "label_adjacent"
      pattern: "邮箱"
    summary:
      type: "section_replace"
      section: "个人介绍"

sections:
  education:
    header: "教育背景"
    entry_schema:
      school:
        type: "keyword_scan"
        keywords:
          - "大学"
          - "学院"
        value_scope: "keyword_substring"
      major:
        type: "keyword_scan"
        keywords:
          - "传播"
          - "媒体"
          - "广告"
          - "专业"
        value_scope: "keyword_substring"
      degree:
        type: "keyword_scan"
        keywords:
          - "本科"
          - "硕士"
          - "博士"
        value_scope: "keyword_substring"
    item_separator: "paragraph"

  experience:
    header: "工作经历"
    entry_schema:
      company:
        type: "keyword_scan"
        keywords:
          - "公司"
          - "广告"
          - "科技"
        value_scope: "keyword_substring"
      role:
        type: "keyword_scan"
        keywords:
          - "专员"
          - "策划"
          - "经理"
          - "助理"
        value_scope: "keyword_substring"
    item_separator: "paragraph"

  honors:
    header: "获奖经历"
    type: "section_replace"

  skills:
    header: "职业技能"
    type: "section_replace"
