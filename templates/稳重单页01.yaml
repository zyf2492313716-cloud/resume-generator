version: "1.0"
template_name: "稳重单页01"
style_group: "稳重"
fallback: false

basic_info:
  fields:
    name:
      type: "keyword_scan"
      keywords:
        - "肖颖馨"
      value_scope: "full_node"
    title:
      type: "label_inline"
      pattern: "求职意向"
    phone:
      type: "label_inline"
      pattern: "手机"
    email:
      type: "label_inline"
      pattern: "邮箱"
    summary:
      type: "section_replace"
      section: "个人介绍"

sections:
  education:
    header: "教育背景"
    entry_schema:
      school:
        type: "keyword_scan"
        keywords:
          - "大学"
          - "学院"
          - "学校"
          - "传媒"
        value_scope: "keyword_substring"
      major:
        type: "keyword_scan"
        keywords:
          - "设计"
          - "艺术"
          - "专业"
        value_scope: "keyword_substring"
      degree:
        type: "keyword_scan"
        keywords:
          - "本科"
          - "硕士"
          - "博士"
        value_scope: "keyword_substring"
    item_separator: "paragraph"

  experience:
    header: "工作经历"
    entry_schema:
      company:
        type: "keyword_scan"
        keywords:
          - "公司"
          - "科技"
          - "企业"
          - "集团"
        value_scope: "keyword_substring"
      role:
        type: "keyword_scan"
        keywords:
          - "经理"
          - "助理"
          - "总监"
          - "专员"
          - "工程师"
        value_scope: "keyword_substring"
    item_separator: "paragraph"

  honors:
    header: "个人荣誉"
    type: "section_replace"
