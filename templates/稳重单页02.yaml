version: "1.0"
template_name: "稳重单页02"
style_group: "稳重"
fallback: false

basic_info:
  fields:
    name:
      type: "keyword_scan"
      keywords:
        - "王菲"
      value_scope: "full_node"
    title:
      type: "keyword_scan"
      keywords:
        - "产品运营"
        - "运营"
        - "方向"
      value_scope: "keyword_substring"
    phone:
      type: "keyword_scan"
      keywords:
        - "18010001000"
        - "180"
      value_scope: "keyword_substring"
    email:
      type: "keyword_scan"
      keywords:
        - "@microsoft.com"
        - "@"
      value_scope: "keyword_substring"

sections:
  education:
    header: "教育背景EDUCATION"
    entry_schema:
      school:
        type: "keyword_scan"
        keywords:
          - "大学"
          - "学院"
        value_scope: "keyword_substring"
      major:
        type: "keyword_scan"
        keywords:
          - "软件"
          - "工程"
          - "交互"
          - "艺术"
        value_scope: "keyword_substring"
      degree:
        type: "keyword_scan"
        keywords:
          - "本科"
          - "硕士"
          - "博士"
        value_scope: "keyword_substring"
    item_separator: "paragraph"

  experience:
    header: "实习经历JOB EXPERIENCE"
    entry_schema:
      company:
        type: "keyword_scan"
        keywords:
          - "优酷"
          - "携程"
          - "公司"
          - "科技"
        value_scope: "keyword_substring"
      role:
        type: "keyword_scan"
        keywords:
          - "实习生"
          - "策划"
          - "产品"
        value_scope: "keyword_substring"
    item_separator: "paragraph"

  honors:
    header: "荣誉AWARDS"
    type: "section_replace"

  skills:
    header: "技能SKILLS"
    type: "section_replace"
