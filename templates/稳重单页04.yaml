version: '1.0'
template_name: 稳重单页04
style_group: 稳重
fallback: false
basic_info:
  fields:
    name:
      type: keyword_scan
      keywords:
      - 背景
      value_scope: full_node
    title:
      type: label_inline
      pattern: 求职意向
    phone:
      type: label_inline
      pattern: 电话
    email:
      type: label_inline
      pattern: 邮箱
    summary:
      type: section_replace
      section: 自我评价
sections:
  education:
    header: 教育背景
    entry_schema:
      school:
        type: keyword_scan
        keywords:
        - 大学
        - 学院
        - 学校
        value_scope: keyword_substring
      major:
        type: keyword_scan
        keywords:
        - 专业
        - 工程
        - 管理
        - 设计
        value_scope: keyword_substring
      degree:
        type: keyword_scan
        keywords:
        - 本科
        - 硕士
        - 博士
        - 学士
        value_scope: keyword_substring
    item_separator: paragraph
  studentWork:
    header: 校内实践
    entry_schema:
      organization:
        type: keyword_scan
        keywords:
        - 学生会
        - 社团
        - 协会
        - 中心
        - 组织
        value_scope: keyword_substring
      role:
        type: keyword_scan
        keywords:
        - 部长
        - 副部
        - 主席
        - 副主席
        - 助理
        - 干事
        - 成员
        value_scope: keyword_substring
    item_separator: paragraph
  skills:
    header: 技能证书
    type: section_replace
  interests:
    header: 兴趣爱好
    type: section_replace
