  experience:
    header: 工作经历
    entry_schema:
      company:
        type: keyword_scan
        keywords:
        - 公司
        - 科技
        - 企业
        - 集团
        - 有限
        - 研究院
        - 医院
        - 银行
        value_scope: keyword_substring
      role:
        type: keyword_scan
        keywords:
        - 经理
        - 助理
        - 总监
        - 专员
        - 工程师
        - 实习
        - 主管
        value_scope: keyword_substring
    item_separator: paragraph
  honors:
    header: 学习成绩GPA3.7/4.3 (优秀），平均分87.34，连续4次获得专项奖学金（专业第一）
    type: section_replace
