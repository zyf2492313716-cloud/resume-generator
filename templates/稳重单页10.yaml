version: '1.0'
template_name: 稳重单页10
style_group: 稳重
fallback: false
basic_info:
  fields:
    name:
      type: keyword_scan
      keywords:
      - 林博文
      value_scope: full_node
    title:
      type: label_inline
      pattern: 求职意向
    phone:
      type: pattern_match
      pattern_type: phone
    email:
      type: label_inline
      pattern: 邮箱
    summary:
      type: section_replace
      section: 自我评价家
sections:
  education:
    header: 教育背景
    entry_schema:
      school:
        type: keyword_scan
        keywords:
        - 大学
        - 学院
        - 学校
        value_scope: keyword_substring
      major:
        type: keyword_scan
        keywords:
        - 专业
        - 工程
        - 管理
        - 设计
        value_scope: keyword_substring
      degree:
        type: keyword_scan
        keywords:
        - 本科
        - 硕士
        - 博士
        - 学士
        value_scope: keyword_substring
    item_separator: paragraph
  skills:
    header: 现场参观审计人员办公方式，访谈EY Audit部门高级经历，了解会计师事务所对技能、证书和素质要求
