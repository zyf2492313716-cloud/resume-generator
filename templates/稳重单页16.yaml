version: '1.0'
template_name: 稳重单页16
style_group: 稳重
fallback: false
basic_info:
  fields:
    name:
      type: keyword_scan
      keywords:
        - "刘 璇"
        - "刘璇"
      value_scope: full_node
    title:
      type: label_inline
      pattern: 求职意向
    phone:
      type: keyword_scan
      keywords:
        - "+86 152 0000 0000"
        - "152 0000 0000"
        - "15200000000"
      value_scope: full_node
    email:
      type: pattern_match
      pattern_type: email
    summary:
      type: section_replace
      section: "自我评价    Profile"
sections:
  education:
    header: "教育背景    Education"
    entry_schema:
      school:
        type: keyword_scan
        keywords:
          - 大学
          - 学院
          - 学校
        value_scope: keyword_substring
      major:
        type: keyword_scan
        keywords:
          - 专业
          - 工程
          - 管理
          - 设计
          - 财务
        value_scope: keyword_substring
      degree:
        type: keyword_scan
        keywords:
          - 本科
          - 硕士
          - 博士
          - 学士
        value_scope: keyword_substring
    item_separator: paragraph
  experience:
    header: "工作经历    Experience"
    entry_schema:
      company:
        type: keyword_scan
        keywords:
          - 公司
          - 科技
          - 企业
          - 集团
          - 有限
          - 信用社
          - 银行
        value_scope: keyword_substring
      role:
        type: keyword_scan
        keywords:
          - 经理
          - 助理
          - 总监
          - 专员
          - 班长
        value_scope: keyword_substring
    item_separator: paragraph
  skills:
    header: "技能证书    Skill"
    type: section_replace
