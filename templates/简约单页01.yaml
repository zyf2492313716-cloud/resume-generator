version: "1.0"
template_name: "简约单页01"
style_group: "简约"
fallback: false

basic_info:
  fields:
    name:
      type: "keyword_scan"
      keywords:
        - "关睢尔"
      value_scope: "full_node"
    title:
      type: "label_inline"
      pattern: "求职意向"
    phone:
      type: "label_group"
      pattern: "手机"
    email:
      type: "label_group"
      pattern: "邮箱"
    summary:
      type: "section_replace"
      section: "自我评价"

sections:
  education:
    header: "教育背景"
    entry_schema:
      school:
        type: "keyword_scan"
        keywords:
          - "大学"
          - "学院"
          - "学校"
          - "工业"
        value_scope: "keyword_substring"
      major:
        type: "keyword_scan"
        keywords:
          - "专业"
          - "营销"
          - "设计"
        value_scope: "keyword_substring"
      degree:
        type: "keyword_scan"
        keywords:
          - "本科"
          - "硕士"
          - "博士"
          - "学士"
          - "专科"
        value_scope: "keyword_substring"
    item_separator: "paragraph"

  experience:
    header: "工作经历"
    entry_schema:
      company:
        type: "keyword_scan"
        keywords:
          - "公司"
          - "科技"
          - "企业"
          - "集团"
          - "网络"
          - "工程"
        value_scope: "keyword_substring"
      role:
        type: "keyword_scan"
        keywords:
          - "专员"
          - "总监"
          - "经理"
          - "助理"
          - "工程师"
          - "设计师"
        value_scope: "keyword_substring"
    item_separator: "paragraph"

  honors:
    header: "证书奖励"
    type: "section_replace"

  studentWork:
    header: "校内实践"
    entry_schema:
      organization:
        type: "keyword_scan"
        keywords:
          - "办公室"
          - "学院"
          - "系"
        value_scope: "keyword_substring"
      role:
        type: "keyword_scan"
        keywords:
          - "助理"
          - "部长"
          - "主任"
        value_scope: "keyword_substring"
    item_separator: "paragraph"
